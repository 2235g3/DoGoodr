spring.application.name=project-vidalia-backend

## Application Properties for Running Tests
## DO NOT USE THIS CONFIGURATION IN PRODUCTION - it is intended for testing purposes only.
## Uses H2 in-memory database for testing, drops and recreates the schema between test runs.

## Database Configuration (H2 In-Memory for tests)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

## JPA/Hibernate in tests: create-drop to ensure clean state between test runs
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.hibernate.ddl-auto=create-drop

## Flyway disabled in tests (use Hibernate DDL auto instead for test data)
spring.flyway.enabled=false

## Security: Allow H2 console access in testing
app.security.allow-h2-console=true

## JWT Configuration (test defaults)
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:bG9jYWwtZGV2LWp3dC1zZWNyZXQtbXVzdC1iZS1yZXBsYWNlZC0yMDI2}
app.security.jwt.access-token-expiration-ms=900000
app.security.jwt.refresh-token-expiration-ms=2592000000

## File upload configuration (tests)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.upload.root-dir=uploads-test
app.upload.profile-pictures-dir=${app.upload.root-dir}/profile-pictures
app.upload.profile-pictures-url-prefix=/uploads/profile-pictures
app.upload.default-profile-picture-url=/images/default-profile.png
app.upload.profile-picture-max-size=5MB
app.upload.profile-pictures-allowed-content-types=image/jpeg,image/png,image/webp

app.upload.cv-dir=${app.upload.root-dir}/cv
app.upload.cv-url-prefix=/uploads/cv
app.upload.cv-max-size=10MB
app.upload.cv-allowed-content-types=application/pdf
