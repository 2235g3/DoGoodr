spring.application.name=project-vidalia-backend

# Production Application Properties
# Includes production database configuration, JWT configuration, and logging settings
# REQUIRED: Set these environment variables before deployment:
# - SPRING_DATASOURCE_URL (e.g., jdbc:postgresql://db:5432/vidalia_db)
# - SPRING_DATASOURCE_USERNAME
# - SPRING_DATASOURCE_PASSWORD
# - APP_SECURITY_JWT_SECRET (minimum 256-bit/44 char base64)

## Database Configuration (PostgreSQL)
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

## Flyway Database Migrations
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

## JPA/Hibernate in production: validate schema only (migrations are handled by Flyway)
spring.jpa.hibernate.ddl-auto=validate

## Disables access to H2 console in production environment
app.security.allow-h2-console=false

## JWT Configuration (REQUIRED: set APP_SECURITY_JWT_SECRET in deployment)
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET}
app.security.jwt.access-token-expiration-ms=900000
app.security.jwt.refresh-token-expiration-ms=2592000000

## File upload configuration (production)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${APP_UPLOAD_MAX_FILE_SIZE:5MB}
spring.servlet.multipart.max-request-size=${APP_UPLOAD_MAX_REQUEST_SIZE:5MB}

app.upload.root-dir=${APP_UPLOAD_ROOT_DIR:uploads}
app.upload.profile-pictures-dir=${APP_UPLOAD_PROFILE_PICTURES_DIR:${app.upload.root-dir}/profile-pictures}
app.upload.profile-pictures-url-prefix=${APP_UPLOAD_PROFILE_PICTURES_URL_PREFIX:/uploads/profile-pictures}
app.upload.default-profile-picture-url=${APP_UPLOAD_DEFAULT_PROFILE_PICTURE_URL:/images/default-profile.png}
app.upload.profile-picture-max-size=${APP_UPLOAD_PROFILE_PICTURE_MAX_SIZE:5MB}
app.upload.profile-pictures-allowed-content-types=${APP_UPLOAD_PROFILE_PICTURES_ALLOWED_CONTENT_TYPES:image/jpeg,image/png,image/webp}

app.upload.cv-dir=${APP_UPLOAD_CV_DIR:${app.upload.root-dir}/cv}
app.upload.cv-url-prefix=${APP_UPLOAD_CV_URL_PREFIX:/uploads/cv}
app.upload.cv-max-size=${APP_UPLOAD_CV_MAX_SIZE:10MB}
app.upload.cv-allowed-content-types=${APP_UPLOAD_CV_ALLOWED_CONTENT_TYPES:application/pdf}
