spring.application.name=project-vidalia-backend

## Application Properties for Development Environment
## DO NOT USE THIS CONFIGURATION IN PRODUCTION - it is intended for development purposes only.
## Uses H2 in-memory database for easy development.
## Automatically creates/updates schema based on JPA entities (ddl-auto=update).

## Database Configuration (H2 In-Memory)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

## JPA/Hibernate in development: auto-update schema based on entities
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update

## Flyway (optional for dev, migrations can still be tracked)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

## Security: Allow H2 console access in development
app.security.allow-h2-console=true
app.cors.allowed-origin-patterns=http://localhost:5173,http://127.0.0.1:5173

## JWT Configuration (development defaults)
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:bG9jYWwtZGV2LWp3dC1zZWNyZXQtbXVzdC1iZS1yZXBsYWNlZC0yMDI2}
app.security.jwt.access-token-expiration-ms=900000
app.security.jwt.refresh-token-expiration-ms=2592000000

## File upload configuration (local development)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

app.upload.root-dir=uploads
app.upload.profile-pictures-dir=${app.upload.root-dir}/profile-pictures
app.upload.profile-pictures-url-prefix=/uploads/profile-pictures
app.upload.default-profile-picture-url=/uploads/profile-pictures/default-profile-picture.png
app.upload.profile-picture-max-size=5MB
app.upload.profile-pictures-allowed-content-types=image/jpeg,image/png,image/webp

app.upload.cv-dir=${app.upload.root-dir}/cv
app.upload.cv-url-prefix=/uploads/cv
app.upload.cv-max-size=10MB
app.upload.cv-allowed-content-types=application/pdf
